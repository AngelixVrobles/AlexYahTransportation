<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terms of Use - AlexyYah Transportation</title>
  <link rel="icon" href="https://www.alexyah.com/assets/img/logos/AlexYahTransportationLogo.png" type="image/png">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@600;700&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #2563eb;
      --dark: #0f172a;
      --gray: #64748b;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
      color: #334155;
    }

    .terms-container {
      max-width: 860px;
      margin: 48px auto;
      background: #fff;
      padding: 56px 48px;
      border-radius: 20px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.06);
      border: 1px solid #e2e8f0;
    }

    h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 12px;
      color: var(--dark);
    }

    .subtitle-line {
      width: 50px;
      height: 3px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      margin: 0 auto 40px;
      border-radius: 2px;
    }

    #termsContent h4 {
      font-family: 'Montserrat', sans-serif;
      margin-top: 36px;
      color: var(--dark);
      font-weight: 700;
      font-size: 1.05rem;
    }

    #termsContent p {
      font-size: 1rem;
      line-height: 1.85;
      color: var(--gray);
    }

    #termsContent ul {
      font-size: 0.95rem;
      line-height: 1.85;
      color: var(--gray);
      padding-left: 20px;
    }

    #termsContent li {
      margin-bottom: 6px;
    }

    .back-btn {
      display: block;
      margin: 48px auto 0;
      padding: 14px 36px;
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: 50px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      border: none;
      color: #fff;
      text-decoration: none;
      text-align: center;
      max-width: 220px;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(37, 99, 235, 0.25);
    }

    .back-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(37, 99, 235, 0.35);
      color: #fff;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--gray);
      font-size: 0.9rem;
    }
  </style>
</head>

<body>
  <div class="terms-container">
    <h1>Terms of Use</h1>
    <div class="subtitle-line"></div>
    <div id="termsContent">
      <div class="loading">Loading content...</div>
    </div>
    <a href="index.html" class="back-btn">← Back to Home</a>
  </div>

  <script>
    async function loadTerms() {
      try {
        const res = await fetch('/api/content/terms');
        const data = await res.json();
        document.getElementById('termsContent').innerHTML = data.content || '<p>No content available.</p>';
      } catch (e) {
        document.getElementById('termsContent').innerHTML = '<p>Error loading content. Please try again later.</p>';
      }
    }
    loadTerms();
  </script>
</body>

</html>
