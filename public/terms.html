<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terms of Use - AlexYah Transportation</title>
  <link href="css/styles.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Roboto Slab', serif;
      background: #f8f9fa;
    }

    .terms-container {
      max-width: 1000px;
      margin: 60px auto;
      background: #fff;
      padding: 50px;
      border-radius: 20px;
      box-shadow: 0px 8px 25px rgba(0, 0, 0, 0.1);
    }

    h1 {
      font-size: 2.5rem;
      text-align: center;
      margin-bottom: 40px;
      color: #0d6efd;
    }

    h4 {
      margin-top: 40px;
      color: #343a40;
      font-weight: bold;
    }

    p {
      font-size: 1.15rem;
      line-height: 1.8;
      color: #555;
    }

    ul {
      font-size: 1.1rem;
      line-height: 1.8;
    }

    .back-btn {
      display: block;
      margin: 50px auto 0;
      padding: 14px 35px;
      font-size: 1.1rem;
      border-radius: 50px;
    }

    #termsContent {
      min-height: 200px;
    }

    .loading-placeholder {
      text-align: center;
      color: #6b7280;
      padding: 40px 0;
    }
  </style>
</head>

<body>
  <div class="terms-container">
    <h1>Terms of Use</h1>
    <p id="termsIntro">Welcome to the AlexYah Transportation website. These Terms of Use govern your access and use of
      our site. By visiting and using this website, you agree to comply with these terms. If you do not agree, please do
      not use this website.</p>
    <div id="termsContent">
      <div class="loading-placeholder"><i>Loading...</i></div>
    </div>
    <a href="index.html" class="btn btn-primary back-btn">← Back to Home</a>
  </div>

  <script>
    (async function () {
      try {
        const res = await fetch('/api/policy');
        const data = await res.json();
        document.getElementById('termsContent').innerHTML = data.terms || '';
      } catch (e) {
        document.getElementById('termsContent').innerHTML = '<p style="color:#dc3545;">Error loading content. Please refresh the page.</p>';
      }
    })();
  </script>
</body>

</html>
